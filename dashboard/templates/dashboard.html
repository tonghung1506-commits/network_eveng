<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Automation Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #050a0f;
    --surface:  #0a1520;
    --border:   #0d2a3a;
    --accent:   #00d4ff;
    --green:    #00ff88;
    --warn:     #ffaa00;
    --danger:   #ff3355;
    --text:     #c8e0f0;
    --dim:      #4a7a9b;
    --mono:     'Share Tech Mono', monospace;
    --sans:     'Exo 2', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(5,10,15,0.95);
    position: sticky; top: 0; z-index: 100;
  }
  .logo-title {
    font-size: 18px; font-weight: 700;
    color: var(--accent); letter-spacing: 3px; text-transform: uppercase;
  }
  .logo-sub {
    font-family: var(--mono); font-size: 11px; color: var(--dim); margin-top: 2px;
  }
  #clock {
    font-family: var(--mono); font-size: 22px;
    color: var(--accent); letter-spacing: 3px;
  }
  #last-poll {
    font-family: var(--mono); font-size: 10px;
    color: var(--dim); text-align: right; margin-top: 2px;
  }

  /* Summary */
  .summary {
    display: flex; gap: 0;
    padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,21,32,0.8);
  }
  .sum-item {
    padding-right: 28px; margin-right: 28px;
    border-right: 1px solid var(--border);
  }
  .sum-item:last-child { border-right: none; }
  .sum-val {
    font-family: var(--mono); font-size: 30px; font-weight: 700; line-height: 1;
  }
  .sum-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--dim); margin-top: 3px;
  }
  .c-blue   { color: var(--accent); }
  .c-green  { color: var(--green); }
  .c-red    { color: var(--danger); }
  .c-warn   { color: var(--warn); }

  /* Action bar */
  .actions {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .btn {
    font-family: var(--mono); font-size: 12px;
    padding: 8px 20px; border-radius: 4px;
    border: 1px solid; background: transparent;
    cursor: pointer; letter-spacing: 1px;
    text-transform: uppercase; transition: all 0.2s;
  }
  .btn:hover { filter: brightness(1.3); }
  .btn-refresh { color: var(--accent);  border-color: var(--accent); }
  .btn-deploy  { color: var(--green);   border-color: var(--green); }
  .btn-backup  { color: var(--warn);    border-color: var(--warn); }
  #action-log {
    font-family: var(--mono); font-size: 11px; color: var(--dim);
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 20px; padding: 24px 32px;
    position: relative; z-index: 1;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .card-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .dev-name  { font-weight: 700; font-size: 16px; color: #fff; letter-spacing: 1px; }
  .dev-host  { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-top: 2px; }
  .badge {
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    padding: 4px 12px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .badge-up      { color: var(--green);  background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); }
  .badge-down    { color: var(--danger); background: rgba(255,51,85,0.1);  border: 1px solid rgba(255,51,85,0.3);
                   animation: blink 1s step-end infinite; }
  .badge-unknown { color: var(--dim);    background: rgba(74,122,155,0.1); border: 1px solid rgba(74,122,155,0.3); }
  @keyframes blink { 50% { opacity: 0.3; } }

  .card-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }

  /* Metric */
  .metric-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--dim); margin-bottom: 5px;
  }
  .bar-wrap {
    height: 7px; background: rgba(255,255,255,0.05);
    border-radius: 4px; overflow: hidden; margin-bottom: 4px;
  }
  .bar-fill {
    height: 100%; border-radius: 4px; transition: width 0.6s ease;
  }
  .bar-cpu  { background: linear-gradient(90deg, #00d4ff, #0077aa); }
  .bar-ram  { background: linear-gradient(90deg, #00ff88, #00aa55); }
  .bar-warn { background: linear-gradient(90deg, #ffaa00, #cc7700); }
  .bar-crit { background: linear-gradient(90deg, #ff3355, #cc0022); }
  .metric-val {
    font-family: var(--mono); font-size: 12px; color: #fff;
    display: flex; justify-content: space-between;
  }

  /* Interfaces */
  .iface-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--dim); margin-bottom: 6px;
  }
  .iface-list { display: flex; flex-direction: column; gap: 3px; }
  .iface-row {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px;
    padding: 4px 8px; border-radius: 3px;
    background: rgba(255,255,255,0.02);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }
  .dot-up   { background: var(--green);  box-shadow: 0 0 5px var(--green); }
  .dot-down { background: var(--danger); box-shadow: 0 0 5px var(--danger);
              animation: blink 1s step-end infinite; }
  .iface-name { color: #fff; flex: 1; }
  .iface-ip   { color: var(--dim); }
  .iface-st-up   { color: var(--green); }
  .iface-st-down { color: var(--danger); }

  .card-foot {
    padding: 8px 18px;
    border-top: 1px solid var(--border);
    font-family: var(--mono); font-size: 10px;
    color: var(--dim); display: flex; justify-content: space-between;
  }

  /* Modal */
  .overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85);
    align-items: center; justify-content: center;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--accent); border-radius: 8px;
    width: 540px; max-width: 90vw; padding: 24px;
    box-shadow: 0 0 60px rgba(0,212,255,0.15);
  }
  .modal h3 { color: var(--accent); font-family: var(--mono); margin-bottom: 14px; }
  .modal pre {
    background: #000; padding: 14px; border-radius: 4px;
    font-family: var(--mono); font-size: 12px; color: var(--green);
    max-height: 280px; overflow-y: auto;
    white-space: pre-wrap; word-break: break-all;
  }
  .modal-close {
    margin-top: 14px; float: right;
    font-family: var(--mono); font-size: 12px;
    padding: 7px 18px; border: 1px solid var(--dim);
    border-radius: 4px; color: var(--dim);
    background: transparent; cursor: pointer;
  }
  .modal-close:hover { color: #fff; border-color: #fff; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-title">📡 Network Automation Monitor</div>
    <div class="logo-sub">Real-time Infrastructure Monitoring · HQ &amp; Branch Sites</div>
  </div>
  <div>
    <div id="clock">--:--:--</div>
    <div id="last-poll">Đang kết nối...</div>
  </div>
</header>

<div class="summary">
  <div class="sum-item">
    <div class="sum-val c-blue"  id="s-total">–</div>
    <div class="sum-label">Thiết bị</div>
  </div>
  <div class="sum-item">
    <div class="sum-val c-green" id="s-up">–</div>
    <div class="sum-label">Online</div>
  </div>
  <div class="sum-item">
    <div class="sum-val c-red"   id="s-down">–</div>
    <div class="sum-label">Offline</div>
  </div>
  <div class="sum-item">
    <div class="sum-val c-warn"  id="s-port-err">–</div>
    <div class="sum-label">Port lỗi</div>
  </div>
  <div class="sum-item">
    <div class="sum-val c-blue"  id="s-avg-cpu">–</div>
    <div class="sum-label">Avg CPU</div>
  </div>
</div>

<div class="actions">
  <button class="btn btn-refresh" onclick="fetchData()">⟳ Refresh</button>
  <button class="btn btn-deploy"  onclick="runAction('deploy')">▶ Deploy Config</button>
  <button class="btn btn-backup"  onclick="runAction('backup')">💾 Backup Now</button>
  <span id="action-log">Sẵn sàng.</span>
</div>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modal-title">Output</h3>
    <pre id="modal-body"></pre>
    <button class="modal-close" onclick="closeModal()">Đóng</button>
  </div>
</div>

<script>
// Clock
function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('vi-VN', {hour12: false});
}
setInterval(tick, 1000); tick();

// Bar class
function barClass(val, type) {
  if (type === 'cpu') return val > 80 ? 'bar-crit' : val > 60 ? 'bar-warn' : 'bar-cpu';
  return val > 85 ? 'bar-crit' : val > 70 ? 'bar-warn' : 'bar-ram';
}

// Render summary
function renderSummary(devices) {
  const up   = devices.filter(d => d.status === 'up').length;
  const down = devices.filter(d => d.status === 'down').length;
  const portErr = devices.reduce((a, d) =>
    a + (d.interfaces||[]).filter(i => i.status === 'down' && i.proto === 'down').length, 0);
  const cpus = devices.filter(d => d.cpu !== null).map(d => d.cpu);
  const avgCpu = cpus.length
    ? Math.round(cpus.reduce((a,b)=>a+b,0)/cpus.length) + '%'
    : '–';

  document.getElementById('s-total').textContent   = devices.length;
  document.getElementById('s-up').textContent      = up;
  document.getElementById('s-down').textContent    = down;
  document.getElementById('s-port-err').textContent= portErr;
  document.getElementById('s-avg-cpu').textContent = avgCpu;
}

// Render cards
function renderGrid(devices) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  devices.forEach(dev => {
    const isUp   = dev.status === 'up';
    const isDown = dev.status === 'down';
    const badgeClass = isUp ? 'badge-up' : isDown ? 'badge-down' : 'badge-unknown';
    const badgeText  = isUp ? '● ONLINE'  : isDown ? '● OFFLINE' : '○ UNKNOWN';

    const cpuVal = dev.cpu ?? 0;
    const cpuTxt = dev.cpu !== null ? dev.cpu + '%' : '–';
    const cpuBar = barClass(cpuVal, 'cpu');

    let ramPct = 0, ramTxt = '–';
    if (dev.ram_used !== null && dev.ram_total) {
      ramPct = Math.round(dev.ram_used / dev.ram_total * 100);
      ramTxt = `${dev.ram_used} / ${dev.ram_total} MB`;
    }
    const ramBar = barClass(ramPct, 'ram');

    // Interface rows
    const ifaceRows = (dev.interfaces || []).map(i => {
      const up  = i.status === 'up' && i.proto === 'up';
      return `
        <div class="iface-row">
          <span class="dot ${up ? 'dot-up' : 'dot-down'}"></span>
          <span class="iface-name">${i.name}</span>
          <span class="iface-ip">${i.ip}</span>
          <span class="${up ? 'iface-st-up' : 'iface-st-down'}">${i.status}/${i.proto}</span>
        </div>`;
    }).join('');

    grid.innerHTML += `
      <div class="card">
        <div class="card-head">
          <div>
            <div class="dev-name">${dev.name}</div>
            <div class="dev-host">${dev.host} · ${dev.location}</div>
          </div>
          <div class="badge ${badgeClass}">${badgeText}</div>
        </div>
        <div class="card-body">
          <div>
            <div class="metric-label">CPU Usage</div>
            <div class="bar-wrap">
              <div class="bar-fill ${cpuBar}" style="width:${cpuVal}%"></div>
            </div>
            <div class="metric-val"><span>CPU</span><span>${cpuTxt}</span></div>
          </div>
          <div>
            <div class="metric-label">RAM Usage</div>
            <div class="bar-wrap">
              <div class="bar-fill ${ramBar}" style="width:${ramPct}%"></div>
            </div>
            <div class="metric-val"><span>${ramPct}%</span><span>${ramTxt}</span></div>
          </div>
          <div>
            <div class="iface-label">Interfaces (${(dev.interfaces||[]).length})</div>
            <div class="iface-list">${ifaceRows || '<div style="color:var(--dim);font-family:var(--mono);font-size:11px">Không có dữ liệu</div>'}</div>
          </div>
        </div>
        <div class="card-foot">
          <span>${dev.host}</span>
          <span>Updated: ${dev.last_updated || '–'}</span>
        </div>
      </div>`;
  });
}

// Fetch data
async function fetchData() {
  try {
    const res  = await fetch('/api/data');
    const data = await res.json();
    renderSummary(data);
    renderGrid(data);
    document.getElementById('last-poll').textContent =
      'Last poll: ' + new Date().toLocaleTimeString('vi-VN', {hour12:false});
  } catch(e) {
    document.getElementById('action-log').textContent = 'Lỗi fetch: ' + e;
  }
}

// Action buttons
async function runAction(type) {
  const log = document.getElementById('action-log');
  log.textContent = (type === 'deploy' ? '▶ Đang deploy...' : '💾 Đang backup...');
  try {
    const res  = await fetch('/api/' + type, {method:'POST'});
    const data = await res.json();
    document.getElementById('modal-title').textContent =
      type === 'deploy' ? 'Deploy Output (TV2)' : 'Backup Output (TV3)';
    document.getElementById('modal-body').textContent = data.output || 'Xong!';
    document.getElementById('overlay').classList.add('show');
    log.textContent = data.success ? '✅ Thành công!' : '❌ Có lỗi!';
  } catch(e) {
    log.textContent = 'Lỗi: ' + e;
  }
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
}

// Auto refresh mỗi 30 giây
fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
